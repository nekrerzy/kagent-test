# LLM egress through agentgateway: kagent's ModelConfig baseUrl points at the
# platform-gw Service (see infra/kagent/values.yaml), so all agent -> LLM
# traffic is mediated here (token accounting, failover hooks, future policies).
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: llm-local
  namespace: agentgateway-system
spec:
  ai:
    provider:
      openai: {}
      # llama-swap on the host, OpenAI-compatible
      host: 10.20.0.1
      port: 9292
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-local
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: platform-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: llm-local
      timeouts:
        request: 900s
        backendRequest: 900s
