# Route for the federated ("virtual") MCP endpoint. The AgentgatewayBackend
# `mcp-catalog` it points at is NOT in git — the platform API owns it and
# rewrites its target list whenever MCP servers are registered or removed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-catalog
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: platform-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: mcp-catalog
      timeouts:
        request: 900s
        backendRequest: 900s
