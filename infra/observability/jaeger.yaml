# Jaeger all-in-one — receives OTLP traces from kagent (infra/kagent/values.yaml)
# and the agentgateway data-plane proxy (infra/observability/agentgateway-tracing.yaml).
#
# Image: jaegertracing/jaeger:2.19.0 (Jaeger v2, verified present on Docker Hub
# for linux/amd64 as of 2026-07-20; runs as uid 10001 by default, which is why
# runAsUser below matches it). v2's default all-in-one config already starts
# OTLP receivers on 4317 (gRPC) / 4318 (HTTP) and the UI/query service on
# 16686 with no config file needed.
#
# Storage: in-memory (image default), capped at ~100k spans. Traces are lost
# on every pod restart and this does not scale past a single replica —
# acceptable for a homelab, not for anything that needs retained trace
# history. Swap in Elasticsearch/Cassandra/badger-on-a-PVC if that's ever
# needed.
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jaeger
          image: docker.io/jaegertracing/jaeger:2.19.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: ui
              containerPort: 16686
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: observability
spec:
  selector:
    app: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: ui
      port: 16686
      targetPort: 16686
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger
  namespace: observability
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: envoy-gateway-system
  hostnames:
    - jaeger.10.20.0.100.sslip.io
  rules:
    - backendRefs:
        - name: jaeger
          port: 16686
