# Proxy-level (data-plane) tracing for the agentgateway `platform-gw` Gateway
# (examples/gateway/agentgateway-gateway.yaml). Chart 1.3.1's Helm values have
# no tracing knobs and its `AgentgatewayParameters` CRD (spec: deployment, env,
# image, istio, logging, modelCatalog, rawConfig, resources, service,
# serviceAccount, shutdown — verified via
# `kubectl get crd agentgatewayparameters.agentgateway.dev -o json`) has no
# tracing field either. Proxy tracing in 1.3.x is instead configured with a
# separate CRD, `AgentgatewayPolicy` (agentgatewaypolicies.agentgateway.dev,
# also verified against the live CRD schema), which carries a
# `spec.frontend.tracing` block and attaches to a Gateway via `targetRefs`.
#
# Per that CRD's validation rules, an AgentgatewayPolicy must live in the same
# namespace as the resource it targets, so this one lives in
# agentgateway-system (overriding the observability Application's default
# namespace) even though the file sits under infra/observability/ per the
# task's placement instruction.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: platform-gw-tracing
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: platform-gw
  frontend:
    tracing:
      backendRef:
        name: jaeger
        namespace: observability
        port: 4317
      protocol: GRPC
      # Homelab, low traffic: trace everything rather than sample.
      randomSampling: "true"
---
# backendRef above crosses from agentgateway-system into observability, which
# Gateway API-style references require a ReferenceGrant for, created in the
# namespace being referenced (observability — the Application's default
# namespace, so no override needed here).
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-agentgateway-tracing
  namespace: observability
spec:
  from:
    - group: agentgateway.dev
      kind: AgentgatewayPolicy
      namespace: agentgateway-system
  to:
    - group: ""
      kind: Service
      name: jaeger
