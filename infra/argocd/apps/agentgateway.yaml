apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agentgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: cr.agentgateway.dev/charts
      chart: agentgateway
      targetRevision: "1.3.1"
      helm:
        valueFiles:
          - $values/infra/agentgateway/values.yaml
    - repoURL: https://github.com/nekrerzy/kagent-test.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: agentgateway-system
  # The agentgateway controller adopts and mutates the chart-created
  # ServiceAccount (labels, automountServiceAccountToken) at runtime; without
  # ignoring those fields, selfHeal fights the controller forever.
  ignoreDifferences:
    - kind: ServiceAccount
      name: agentgateway
      namespace: agentgateway-system
      jsonPointers:
        - /automountServiceAccountToken
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
