# agentgateway Helm chart values — pinned to chart version 1.3.1 (see
# infra/argocd/apps/agentgateway.yaml). Image tags left at chart default.
# GatewayClass "agentgateway" is created by this chart automatically — the
# Gateway object itself is examples/gateway/agentgateway-gateway.yaml (applied
# after this controller is up, via the wave-2 platform-examples app).

# The chart's own rendered Deployment leaves podSecurityContext empty and never
# sets seccompProfile at pod or container level. Container-level securityContext
# (allowPrivilegeEscalation: false, capabilities drop ALL, runAsNonRoot: true,
# readOnlyRootFilesystem: true) is hardcoded in the chart templates already and
# not affected by these values. Without this override the controller pod is
# rejected by the cluster's default `restricted` Pod Security Admission (missing
# seccompProfile). Verified via `helm template` — see validation notes.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
